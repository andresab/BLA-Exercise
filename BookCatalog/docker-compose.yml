services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "BookCatalog_2024!"
      MSSQL_DB: BookCatalogDb
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P BookCatalog_2024! -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 12

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db:/scripts
    command: >
      /bin/bash -c "/opt/mssql-tools/bin/sqlcmd -S db -U sa -P BookCatalog_2024! -i /scripts/01_schema.sql &&
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P BookCatalog_2024! -i /scripts/02_seed.sql"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/BookCatalog.API/Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=db;Database=BookCatalogDb;User Id=sa;Password=BookCatalog_2024!;TrustServerCertificate=True;Encrypt=False"
      Jwt__Key: "docker-bookcatalog-key-change-before-production-32chars"
      Jwt__Issuer: "BookCatalog"
      Jwt__Audience: "BookCatalogClient"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  mssql-data:
